<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>單元三 · 分組投稿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="fbconfig.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--c:#862633}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans TC","PingFang TC",sans-serif;background:#FAF7F2;color:#1A1A1A;line-height:1.6;padding:env(safe-area-inset-top) 0 2em}
.bar{background:var(--c);color:#fff;padding:1.1em 1.1em;position:sticky;top:0;z-index:10;box-shadow:0 3px 14px rgba(0,0,0,.18)}
.bar .g{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.5rem;letter-spacing:.03em}
.bar .s{font-size:.85rem;opacity:.9;margin-top:.15em}
.wrap{max-width:640px;margin:0 auto;padding:1em 1.1em}
.intro{color:#6B6B6B;font-size:.95rem;margin:.2em 0 1.2em}
.blk{background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(134,38,51,.08);border-top:5px solid var(--c);padding:1.1em 1.1em 1.2em;margin-bottom:1.3em}
label{display:block;font-family:"Noto Serif TC",serif;font-weight:700;font-size:1.18rem;color:var(--c);margin-bottom:.5em}
textarea{width:100%;font-family:inherit;font-size:1.08rem;line-height:1.6;padding:.7em .8em;border:2px solid #E5DDD0;border-radius:12px;background:#fffdf9;resize:vertical;min-height:6.5em}
textarea:focus{outline:none;border-color:var(--c)}
button.send{margin-top:.7em;width:100%;background:var(--c);color:#fff;border:none;border-radius:999px;padding:.85em;font-size:1.1rem;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.05em}
button.send:active{transform:translateY(1px);opacity:.9}
.list{margin-top:1em;display:flex;flex-direction:column;gap:.55em}
.item{background:#FBF6E8;border-left:4px solid var(--c);border-radius:8px;padding:.6em .8em;font-size:1rem;white-space:pre-wrap;position:relative}
.item .del{position:absolute;top:.3em;right:.5em;color:#b08;opacity:.5;font-size:.8rem;background:none;border:none;cursor:pointer}
.empty{color:#9a8f7d;font-style:italic;font-size:.95rem}
.foot{text-align:center;color:#6B6B6B;font-size:.85rem;margin-top:.5em;padding:0 1em}
.flash{position:fixed;left:50%;bottom:1.5em;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.85);color:#fff;padding:.6em 1.4em;border-radius:999px;font-size:1rem;opacity:0;transition:.3s;z-index:50;pointer-events:none}
.flash.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bar"><div class="g" id="gName">第 ? 組</div><div class="s" id="gSub">把全組討論的精華打上來</div></div>
<div class="wrap">
  <p class="intro" id="introTxt">把你們這一組討論的結果<b>充分</b>寫下來，字數不限、可分多次送出。送出後會即時出現在投影幕上你們這一組的頁面。</p>
  <section class="blk" id="blkMain">
    <label id="lblMain">① 課前兩題·最有感的一點（一句＋為什麼）</label>
    <textarea id="main" placeholder="課前兩題（卡繆的抉擇／飲食指南的改變），全組覺得最有感或最有爭議的一點是什麼？用一句話講出來，再說說為什麼…"></textarea>
    <button class="send" onclick="send()">送出</button>
    <div class="list" id="mainList"></div>
  </section>
  <p class="foot" id="foot">連線中…</p>
</div>
<div class="flash" id="flash"></div>
<script>
(function(){
  var GROUPS={1:{c:'#862633'},2:{c:'#A8782E'},3:{c:'#1E5F74'},4:{c:'#6B5635'},5:{c:'#5C1A23'}};
  var p=new URLSearchParams(location.search);
  var g=(p.get('g')||'1').replace(/[^1-5]/g,'')||'1';
  var round=(p.get('r')==='kaocheng')?'kaocheng':'prologue';
  var C=GROUPS[g].c;
  document.documentElement.style.setProperty('--c',C);
  document.getElementById('gName').textContent='第 '+g+' 組';
  if(round==='kaocheng'){
    document.getElementById('gSub').textContent='〈考城隍〉的兩種道德判斷';
    document.getElementById('introTxt').innerHTML='把你們這一組對〈考城隍〉的討論寫下來：<b>用兩種道德判斷詮釋考題與宋公的回答，並說明兩者的不對稱關係</b>。送出後即時出現在投影幕你們這一組的頁面。';
    document.getElementById('lblMain').textContent='② 兩種判斷的詮釋＋不對稱關係';
    document.getElementById('main').placeholder='例：用「看動機」這把尺……用「看後果」這把尺……我們認為兩者的不對稱在於……';
    document.getElementById('blkMain').style.borderTopColor=C;
    document.title='第'+g+'組 考城隍 · 投稿';
  }else{
    document.getElementById('gSub').textContent='課前兩題·把全組最有感的一點打上來';
    document.title='第'+g+'組 課前作業 · 投稿';
  }
  function esc(s){return String(s||'').replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];});}
  function configured(){return window.FB_CONFIG&&FB_CONFIG.apiKey&&FB_CONFIG.apiKey.indexOf('PASTE')<0;}
  function listify(o){if(!o)return[];return Object.keys(o).sort(function(a,b){return (o[a].t||0)-(o[b].t||0);}).map(function(k){return {k:k,txt:o[k].txt};});}
  var DB=null, foot=document.getElementById('foot');
  function flash(t){var f=document.getElementById('flash');f.textContent=t;f.classList.add('show');setTimeout(function(){f.classList.remove('show');},1400);}
  function render(arr){
    var box=document.getElementById('mainList');
    if(!arr||!arr.length){box.innerHTML='<div class="empty">還沒送出內容。</div>';return;}
    box.innerHTML=arr.map(function(o){
      var del=DB?'<button class="del" data-k="'+o.k+'">刪</button>':'';
      return '<div class="item">'+esc(o.txt)+del+'</div>';
    }).join('');
  }
  document.getElementById('mainList').addEventListener('click',function(e){
    var b=e.target.closest&&e.target.closest('.del'); if(!b||!DB)return;
    DB.child(b.getAttribute('data-k')).remove();
  });
  var LKEY='u3_'+round+'_'+(window.FB_ROOM||'local')+'_g'+g;
  function loadLocal(){try{return JSON.parse(localStorage.getItem(LKEY))||[];}catch(e){return [];}}
  function saveLocal(a){try{localStorage.setItem(LKEY,JSON.stringify(a));}catch(e){}}
  function renderLocal(){render(loadLocal().map(function(t,i){return {k:i,txt:t};}));}
  window.send=function(){
    var ta=document.getElementById('main'),txt=(ta.value||'').trim();if(!txt){flash('先寫點東西再送出');return;}
    if(DB){DB.push({txt:txt,t:Date.now()});}
    else{var a=loadLocal();a.push(txt);saveLocal(a);renderLocal();}
    ta.value='';flash('已送出！');
  };
  if(configured()&&typeof firebase!=='undefined'){
    try{
      firebase.initializeApp(window.FB_CONFIG);
      DB=firebase.database().ref('rooms/'+(window.FB_ROOM||'default')+'/'+round+'/g'+g);
      DB.on('value',function(snap){render(listify(snap.val()||{}));});
      foot.textContent='● 已連線（房號 '+(window.FB_ROOM||'default')+'）—— 送出後投影幕即時更新';
    }catch(e){foot.textContent='⚠ 連線失敗，改用本機暫存：'+e.message;renderLocal();}
  } else {
    foot.textContent='○ 尚未設定雲端（fbconfig.js）——此頁僅本機測試，不會傳到投影幕';
    renderLocal();
  }
})();
</script>
</body>
</html>
